server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_aquarium?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tcp:
  gateway:
    port: 9527
    boss-threads: 1
    worker-threads: 4
    heartbeat-interval: 60

water-quality:
  thresholds:
    temperature:
      min: 22.0
      max: 28.0
      warning-min: 20.0
      warning-max: 30.0
    ph:
      min: 6.5
      max: 8.5
      warning-min: 6.0
      warning-max: 9.0
    chlorine:
      min: 0.0
      max: 0.01
      warning-min: 0.0
      warning-max: 0.05
    dissolved-oxygen:
      min: 5.0
      max: 20.0
      warning-min: 4.0
      warning-max: 25.0

rabbitmq:
  exchange:
    device-command: aquarium.device.command
    sensor-data: aquarium.sensor.data
    alert: aquarium.alert
  queue:
    sensor-data: aquarium.queue.sensor.data
    device-command: aquarium.queue.device.command
    alert: aquarium.queue.alert
  routing-key:
    sensor-data: sensor.data.#
    device-command: device.command.#
    alert: alert.#
